{% extends "admin/base_admin.html" %}

{% block page_title %}Cài đặt quán{% endblock %}
{% block page_subtitle %}Quản lý thông tin quán cà phê{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <form method="POST" action="{{ url_for('admin.settings_update') }}" class="space-y-6">
        <!-- Card -->
        <div class="bg-surface border border-border rounded-xl p-6 space-y-5">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center">
                    <i data-lucide="store" class="w-5 h-5 text-primary"></i>
                </div>
                <div>
                    <h3 class="font-display text-lg font-bold text-gray-900">Thông tin quán</h3>
                    <p class="text-sm text-muted">Cập nhật thông tin hiển thị trên hóa đơn và hệ thống</p>
                </div>
            </div>

            <!-- Tên quán -->
            <div>
                <label for="shop_name" class="block text-sm font-medium text-gray-700 mb-1.5">Tên quán</label>
                <input
                    type="text"
                    id="shop_name"
                    name="shop_name"
                    value="{{ settings.shop_name }}"
                    placeholder="Nhập tên quán"
                    class="w-full h-11 px-4 bg-cream border border-border rounded-lg text-sm text-gray-800 placeholder:text-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20"
                >
            </div>

            <!-- Địa chỉ -->
            <div>
                <label for="shop_address" class="block text-sm font-medium text-gray-700 mb-1.5">Địa chỉ</label>
                <input
                    type="text"
                    id="shop_address"
                    name="shop_address"
                    value="{{ settings.shop_address }}"
                    placeholder="Nhập địa chỉ quán"
                    class="w-full h-11 px-4 bg-cream border border-border rounded-lg text-sm text-gray-800 placeholder:text-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20"
                >
            </div>

            <!-- Số điện thoại -->
            <div>
                <label for="shop_phone" class="block text-sm font-medium text-gray-700 mb-1.5">Số điện thoại</label>
                <input
                    type="text"
                    id="shop_phone"
                    name="shop_phone"
                    value="{{ settings.shop_phone }}"
                    placeholder="Nhập số điện thoại"
                    class="w-full h-11 px-4 bg-cream border border-border rounded-lg text-sm text-gray-800 placeholder:text-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20"
                >
            </div>

            <!-- WiFi -->
            <div>
                <label for="shop_wifi" class="block text-sm font-medium text-gray-700 mb-1.5">Mật khẩu WiFi</label>
                <input
                    type="text"
                    id="shop_wifi"
                    name="shop_wifi"
                    value="{{ settings.shop_wifi }}"
                    placeholder="Nhập mật khẩu WiFi cho khách"
                    class="w-full h-11 px-4 bg-cream border border-border rounded-lg text-sm text-gray-800 placeholder:text-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20"
                >
            </div>

            <!-- Footer hóa đơn -->
            <div>
                <label for="invoice_footer" class="block text-sm font-medium text-gray-700 mb-1.5">Footer hóa đơn</label>
                <textarea
                    id="invoice_footer"
                    name="invoice_footer"
                    rows="3"
                    placeholder="Nội dung hiển thị cuối hóa đơn"
                    class="w-full px-4 py-3 bg-cream border border-border rounded-lg text-sm text-gray-800 placeholder:text-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 resize-none"
                >{{ settings.invoice_footer }}</textarea>
            </div>
        </div>

        <!-- Submit -->
        <div class="flex justify-end">
            <button
                type="submit"
                class="brew-btn-primary"
            >
                <i data-lucide="save" class="w-4 h-4"></i>
                <span>Lưu cài đặt</span>
            </button>
        </div>
    </form>
</div>
{% endblock %}
